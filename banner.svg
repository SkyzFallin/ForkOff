<svg xmlns="http://www.w3.org/2000/svg" width="760" height="180" viewBox="0 0 760 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="760" height="180" fill="url(#bg)"/>
  <line x1="0" y1="170" x2="760" y2="170" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

  <!-- Git fork icon -->
  <g transform="translate(95, 90)" filter="url(#glow)">
    <!-- Main trunk line -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Fork branch curving right -->
    <path d="M0,-15 C0,-15 8,-18 18,-30 C28,-42 32,-50 32,-50" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Top node (source) -->
    <circle cx="0" cy="-50" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <!-- Fork node (branch) -->
    <circle cx="32" cy="-50" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <!-- Bottom node (merge point) -->
    <circle cx="0" cy="50" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <!-- Small dots inside nodes -->
    <circle cx="0" cy="-50" r="2.5" fill="#58a6ff" opacity="0.8"/>
    <circle cx="32" cy="-50" r="2.5" fill="#58a6ff" opacity="0.8"/>
    <circle cx="0" cy="50" r="2.5" fill="#58a6ff" opacity="0.8"/>
  </g>

  <!-- Text content -->
  <text x="420" y="72" font-family="'Courier New', Courier, monospace" font-size="38" font-weight="bold" fill="#58a6ff" text-anchor="middle" letter-spacing="4">ForkOff</text>
  <text x="420" y="110" font-family="'Courier New', Courier, monospace" font-size="14" fill="#8b949e" text-anchor="middle">Back up your repos before GitHub decides they're not your repos.</text>
  <text x="420" y="148" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58" text-anchor="middle">Automated Daily GitHub Mirror Backup</text>
</svg>
