<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="180" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="760" height="2" fill="url(#accent)" opacity="0.7"/>
  <rect x="0" y="178" width="760" height="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="36" x2="760" y2="36"/>
    <line x1="0" y1="72" x2="760" y2="72"/>
    <line x1="0" y1="108" x2="760" y2="108"/>
    <line x1="0" y1="144" x2="760" y2="144"/>
  </g>

  <!-- Git fork icon -->
  <g transform="translate(88, 72)" filter="url(#glow)">
    <!-- Main trunk -->
    <line x1="0" y1="-42" x2="0" y2="42" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Fork branch -->
    <path d="M0,-10 C0,-10 10,-14 22,-28 C34,-42 38,-42 38,-42" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Top node -->
    <circle cx="0" cy="-42" r="7" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="0" cy="-42" r="3" fill="#58a6ff" opacity="0.8"/>
    <!-- Fork node -->
    <circle cx="38" cy="-42" r="7" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="38" cy="-42" r="3" fill="#58a6ff" opacity="0.8"/>
    <!-- Bottom node -->
    <circle cx="0" cy="42" r="7" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="0" cy="42" r="3" fill="#58a6ff" opacity="0.8"/>
    <!-- Arrow on trunk -->
    <polyline points="-5,30 0,38 5,30" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- Accent divider -->
  <line x1="155" y1="20" x2="155" y2="160" stroke="#58a6ff" stroke-width="1" opacity="0.15"/>

  <!-- Faded backup log -->
  <g font-family="'Courier New', Courier, monospace" font-size="9" fill="#58a6ff" opacity="0.08">
    <text x="580" y="28">03:00 BACKUP START</text>
    <text x="580" y="42">REPOS: 17 found</text>
    <text x="580" y="56">CLONE --mirror</text>
    <text x="580" y="70">FSCK: 3 checked</text>
    <text x="580" y="84">SIZE: 842 MB</text>
    <text x="580" y="98">PASS: 17/17</text>
    <text x="580" y="112">FAIL: 0</text>
    <text x="580" y="126">REPORT: saved</text>
    <text x="580" y="140">RETENTION: 366d</text>
    <text x="580" y="154">NEXT: 03:00 UTC</text>
  </g>

  <!-- Title -->
  <text x="172" y="52" font-family="'Courier New', Courier, monospace" font-size="30" font-weight="bold" fill="#58a6ff" filter="url(#glow)">ForkOff</text>

  <!-- Subtitle -->
  <text x="174" y="76" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8b949e">Automated Daily GitHub Mirror Backup</text>

  <!-- Description -->
  <text x="174" y="100" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">Full history  ·  Integrity checks  ·  JSON audit reports  ·  366-day retention</text>

  <!-- Badges -->
  <g font-family="'Courier New', Courier, monospace" font-size="9.5" font-weight="700">
    <rect x="174" y="112" width="42" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="195" y="124" fill="#58a6ff" text-anchor="middle">bash</text>
    <rect x="222" y="112" width="56" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="250" y="124" fill="#6b7280" text-anchor="middle">systemd</text>
    <rect x="284" y="112" width="28" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="298" y="124" fill="#6b7280" text-anchor="middle">git</text>
    <rect x="318" y="112" width="62" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="349" y="124" fill="#6b7280" text-anchor="middle">GH API</text>
    <rect x="386" y="112" width="44" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="408" y="124" fill="#6b7280" text-anchor="middle">audit</text>
  </g>

  <!-- Author -->
  <text x="174" y="160" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">SkyzFallin</text>
</svg>
